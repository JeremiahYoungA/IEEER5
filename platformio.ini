[env:seeed_xiao_esp32_c6]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-esp32-c6
framework = arduino
monitor_speed = 115200

# This flag helps with debugging Wi-Fi/I2C issues under the hood
build_flags = -DCORE_DEBUG_LEVEL=3

lib_deps =
    mathworks/ThingSpeak @ ^2.0.0
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BME680 Library @ ^2.0.3  # Your I2C temperature/humidity/pressure/gas sensor
    adafruit/Adafruit BusIO @ ^1.16.1          # Required for many I2C sensors
    Wire                                       # Essential for I2C